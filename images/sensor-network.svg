<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1620 940" role="img" aria-labelledby="title desc">
  <title id="title">Sensor network architecture</title>
  <desc id="desc">Sensor board sends temperature, humidity, pressure and dust data to MQTT and web servers, then to mobile and PC trend storage.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#111"/>
    </marker>
    <linearGradient id="internet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56a3d9"/>
      <stop offset="0.48" stop-color="#1c5f9b"/>
      <stop offset="1" stop-color="#0e244e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="11" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1620" height="940" fill="#fff"/>

  <text x="98" y="170" font-family="Arial, sans-serif" font-size="42" fill="#111">Web 서버</text>
  <text x="88" y="382" font-family="Arial, sans-serif" font-size="42" fill="#111">MQTT 서버</text>
  <path d="M198 215v108" stroke="#80786c" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)" opacity="0.8"/>
  <path d="M205 410v82" stroke="#80786c" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)" opacity="0.8"/>

  <g transform="translate(328 68)" filter="url(#softShadow)">
