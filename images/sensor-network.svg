    <path d="M37 86c17-42 61-59 101-38 42 22 43 80-3 110" fill="none" stroke="#fff" stroke-width="5" opacity="0.92"/>
    <path d="M31 88c25 26 56 38 111 17" fill="none" stroke="#fff" stroke-width="5" opacity="0.92"/>
    <path d="M92 18c34 41 29 92-7 144" fill="none" stroke="#fff" stroke-width="4" opacity="0.86"/>
    <path d="M58 39c31-5 72 7 101 38" fill="none" stroke="#fff" stroke-width="4" opacity="0.86"/>
    <circle cx="65" cy="60" r="6" fill="#fff"/>
    <circle cx="98" cy="42" r="6" fill="#fff"/>
