    <rect x="16" y="80" width="60" height="58" rx="5" fill="#1f2937"/>
    <rect x="90" y="78" width="46" height="42" fill="#334155"/>
    <rect x="156" y="76" width="66" height="48" fill="#2dd4bf"/>
